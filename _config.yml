title: L⁺QC
description: A community of qualitative researchers across the UK
theme: just-the-docs

url: https://londonqualcommunity.com

aux_links:
  L⁺QC on GitHub: https://github.com/linxule/lqc
  LinkedIn: https://www.linkedin.com/groups/12947079/

# Color scheme supports "light" (default) and "dark"
color_scheme: dark

# Logo and favicon
logo: "/assets/logos/logo.png"
favicon_ico: "/assets/logos/icon.png"

# Enable or disable the site search
# Supports true (default) or false
search_enabled: true

# Back to top for long pages
back_to_top: true
back_to_top_text: "Back to top"

# Hide pages
exclude:
  - discussions/
  - CLAUDE.md

# Jekyll `defaults` blocks. Order matters: broader scopes first, narrower
# scopes later so they can override.
#
# Scope 1 (sitewide) gives every page an `image:` so jekyll-seo-tag can
# emit og:image / twitter:image tags. jekyll-seo-tag only reads
# `page.image` — a site-level `image:` key is ignored for meta tags.
#
# Scope 2 (docs/Events) sets `layout` and `has_toc` for event pages so
# contributors don't need to repeat them in every file's front matter.
# Do NOT add `grand_parent: Events` here — the scope matches section-shell
# pages (Events.md, upcoming-events.md, past-events.md, ResearchSeminars.md)
# which already have `parent: Events`, and `parent == grand_parent` breaks
# JTD's nav tree. JTD walks the parent chain automatically for nesting.
defaults:
  - scope:
      path: ""
      type: pages
    values:
      image: /assets/LQC.jpg
  - scope:
      path: "docs/Events"
      type: pages
    values:
      layout: default
      has_toc: true

# Custom callout types. Use via Kramdown attribute syntax:
#   > This is a deadline note
#   {: .deadline }
callouts_level: quiet
callouts:
  new:
    title: New
    color: green
  deadline:
    title: Deadline
    color: red
  archive:
    title: Archive
    color: grey-dk
  highlight:
    color: yellow

# SEO metadata — consumed by jekyll-seo-tag (bundled with just-the-docs).
# The site-level og:image comes from the Jekyll `defaults` block above
# (jekyll-seo-tag only reads page.image, not a site-level image key).
# The proper 1200x630 OG card is a later committee task — /assets/LQC.jpg
# is a stopgap and will be cropped differently by each platform.
#
# L+QC has no Twitter/X account — LinkedIn is the community's primary
# social channel. We deliberately do NOT set:
#  - `twitter:` block: jekyll-seo-tag would emit twitter:site: @ and
#    twitter:creator: @<author name> which look broken.
#  - `social.name`: jekyll-seo-tag would mis-consume it as twitter:creator.
# LinkedIn, Slack, iMessage and other unfurlers read Open Graph tags
# (og:image/title/description), not twitter-specific tags, so dropping
# them costs nothing.
#
# `social.links` is kept because jekyll-seo-tag uses it for schema.org
# `sameAs`, which feeds Google's Knowledge Graph.
author: London⁺ Qualitative Community
social:
  links:
    - https://www.linkedin.com/groups/12947079/
    - https://github.com/linxule/lqc

# Search tuning. Default JTD search indexes h1–h6 including boilerplate
# event sub-headings, which floods results. Scope to h2 and add previews.
search:
  heading_level: 2
  previews: 2
  preview_words_before: 3
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false