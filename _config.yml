title: L⁺QC
description: A community of qualitative researchers across the UK
theme: just-the-docs

url: https://londonqualcommunity.com

aux_links:
  L⁺QC on GitHub: https://github.com/linxule/lqc
  LinkedIn: https://www.linkedin.com/groups/12947079/

# Color scheme supports "light" (default) and "dark"
color_scheme: dark

# Logo and favicon
logo: "/assets/logos/logo.png"
favicon_ico: "/assets/logos/icon.png"

# Enable or disable the site search
# Supports true (default) or false
search_enabled: true

# Back to top for long pages
back_to_top: true
back_to_top_text: "Back to top"

# Hide pages
exclude:
  - discussions/
  - CLAUDE.md

# Default front matter for event pages.
# New events under docs/Events/ inherit layout and has_toc automatically —
# contributors only need to set title, nav_order, and parent.
#
# NOTE: do NOT set grand_parent here. The scope matches every page under
# docs/Events/ including section shells (Events.md, upcoming-events.md,
# past-events.md, ResearchSeminars.md) which themselves have
# `parent: Events`. Setting `grand_parent: Events` here would create
# parent == grand_parent and break the JTD nav tree for those sections.
# JTD walks the parent chain automatically, so grand_parent is not
# required for 3-level nesting.
defaults:
  - scope:
      path: "docs/Events"
      type: pages
    values:
      layout: default
      has_toc: true

# Custom callout types. Use via Kramdown attribute syntax:
#   > This is a deadline note
#   {: .deadline }
callouts_level: quiet
callouts:
  new:
    title: New
    color: green
  deadline:
    title: Deadline
    color: red
  archive:
    title: Archive
    color: grey-dk
  highlight:
    color: yellow

# Social & SEO — consumed by jekyll-seo-tag (bundled with just-the-docs)
# Note: /assets/LQC.jpg is a stopgap — a proper 1200x630 OG card is a
# later committee task.
image: /assets/LQC.jpg
author: London⁺ Qualitative Community
twitter:
  card: summary_large_image
social:
  name: London⁺ Qualitative Community
  links:
    - https://www.linkedin.com/groups/12947079/
    - https://github.com/linxule/lqc

# Search tuning. Default JTD search indexes h1–h6 including boilerplate
# event sub-headings, which floods results. Scope to h2 and add previews.
search:
  heading_level: 2
  previews: 2
  preview_words_before: 3
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false